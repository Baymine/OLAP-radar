# olap-radar configuration
# Edit this file to customize which repositories are tracked.
# Changes take effect on the next workflow run.

# ── Primary focus engine ──────────────────────────────────────────────────────
# Tracked with a dedicated deep-dive report. Set paginated: true for high-volume repos.

primary_repo:
  id: doris
  repo: apache/doris
  name: Apache Doris
  paginated: true

# ── Peer OLAP engines ─────────────────────────────────────────────────────────
# Tracked alongside Apache Doris for cross-ecosystem comparison.

peer_repos:
  - id: clickhouse
    repo: ClickHouse/ClickHouse
    name: ClickHouse
    paginated: true
  - id: duckdb
    repo: duckdb/duckdb
    name: DuckDB
    paginated: true
  - id: starrocks
    repo: StarRocks/StarRocks
    name: StarRocks
    paginated: true
  - id: apache-iceberg
    repo: apache/iceberg
    name: Apache Iceberg
  - id: delta-io
    repo: delta-io/delta
    name: Delta Lake
  - id: databend
    repo: databendlabs/databend
    name: Databend
  - id: velox
    repo: facebookincubator/velox
    name: Velox
  - id: gluten
    repo: apache/incubator-gluten
    name: Apache Gluten
  - id: apache-arrow
    repo: apache/arrow
    name: Apache Arrow

# ── OLAP ecosystem index repos ────────────────────────────────────────────────
# Broader OLAP/data-infrastructure pulse tracking.

index_repos:
  - id: dbt-core
    repo: dbt-labs/dbt-core
    name: dbt-core
  - id: apache-spark
    repo: apache/spark
    name: Apache Spark
    paginated: true
  - id: substrait
    repo: substrait-io/substrait
    name: Substrait
